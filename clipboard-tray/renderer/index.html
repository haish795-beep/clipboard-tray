<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>클립보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Segoe UI", sans-serif;
    background: #111113;
    color: #e8e8e8;
    height: 560px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border: 1px solid #2a2a2e;
    border-radius: 10px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 10px;
    border-bottom: 1px solid #1e1e22;
    -webkit-app-region: drag;
    user-select: none;
  }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header-title { font-size: 13px; font-weight: 600; color: #fff; letter-spacing: 0.3px; }
  .badge {
    font-size: 10px;
    background: #2a2a2e;
    color: #888;
    padding: 2px 6px;
    border-radius: 10px;
  }
  .header-actions { display: flex; gap: 6px; -webkit-app-region: no-drag; }
  .btn-sm {
    background: #1e1e22;
    border: none;
    color: #888;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-sm:hover { background: #2a2a2e; color: #ccc; }
  .btn-close:hover { background: #3a1a1a; color: #e06060; }

  .search-wrap { padding: 8px 12px; border-bottom: 1px solid #1e1e22; }
  .search {
    width: 100%;
    background: #1a1a1e;
    border: 1px solid #2a2a2e;
    border-radius: 6px;
    color: #e0e0e0;
    font-size: 12px;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: #444; }
  .search::placeholder { color: #444; }

  .list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .list::-webkit-scrollbar { width: 4px; }
  .list::-webkit-scrollbar-track { background: transparent; }
  .list::-webkit-scrollbar-thumb { background: #2a2a2e; border-radius: 4px; }

  .item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 12px;
    cursor: pointer;
    border-radius: 6px;
    margin: 0 6px 2px;
    transition: background 0.1s;
    position: relative;
  }
  .item:hover { background: #1a1a1e; }
  .item:hover .del-btn { opacity: 1; }

  .item-icon {
    width: 28px;
    height: 28px;
    border-radius: 5px;
    background: #1e1e22;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    overflow: hidden;
  }
  .item-icon img { width: 28px; height: 28px; object-fit: cover; border-radius: 5px; }

  .item-body { flex: 1; min-width: 0; }
  .item-text {
    font-size: 12px;
    color: #ccc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-meta { font-size: 10px; color: #555; margin-top: 2px; }

  .del-btn {
    opacity: 0;
    background: none;
    border: none;
    color: #555;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 4px;
    transition: color 0.15s, opacity 0.15s;
    flex-shrink: 0;
  }
  .del-btn:hover { color: #e06060; }

  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: #333;
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; opacity: 0.3; }

  .footer {
    padding: 8px 14px;
    border-top: 1px solid #1e1e22;
    font-size: 10px;
    color: #333;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <span class="header-title">클립보드</span>
    <span class="badge" id="count">0</span>
  </div>
  <div class="header-actions">
    <button class="btn-sm" id="clearBtn">전체 삭제</button>
    <button class="btn-sm btn-close" id="closeBtn">✕</button>
  </div>
</div>

<div class="search-wrap">
  <input class="search" id="search" placeholder="검색..." autocomplete="off" />
</div>

<div class="list" id="list"></div>

<div class="footer">Ctrl+Shift+V · 클릭하여 복사</div>

<script src="app.js"></script>
</body>
</html>
